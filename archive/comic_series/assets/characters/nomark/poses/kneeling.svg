<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <!-- NOMARK Character - Kneeling Pose -->
  
  <!-- DEFINITIONS -->
  <defs>
    <linearGradient id="hoodieGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF"/>
      <stop offset="100%" style="stop-color:#00CCCC"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0080"/>
      <stop offset="100%" style="stop-color:#CC0066"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- === LEGS (kneeling, one knee down) === -->
  <path d="M150 340 L130 450 L155 460 L165 380 L195 380 L205 460 L230 450 L210 340 Z" fill="#1A1A1A"/>
  <!-- Shoes (one tucked, one visible) -->
  <path d="M155 460 L130 475 L155 485 L175 470 Z" fill="#0D0D0D"/>
  <path d="M205 460 L230 475 L205 485 L185 470 Z" fill="#0D0D0D"/>
  
  <!-- === HOODIE BODY (lower, bent forward) === -->
  <path d="M145 200 
           Q135 210 135 250 
           L135 370 
           Q135 390 155 390
           L215 390
           Q235 390 235 370
           L235 250
           Q235 210 225 200
           Q200 190 145 200 Z" 
        fill="url(#hoodieGradient)" stroke="#333" stroke-width="2"/>
  
  <!-- Hood -->
  <ellipse cx="185" cy="170" rx="65" ry="70" fill="#1A1A1A"/>
  <ellipse cx="185" cy="165" rx="55" ry="55" fill="#0D0D0D"/>
  <ellipse cx="185" cy="190" rx="40" ry="35" fill="#1A1A1A"/>
  <path d="M145 170 Q185 150 225 170" fill="none" stroke="#000" stroke-width="3" opacity="0.5"/>
  
  <!-- === ARMS (resting on knees) === -->
  <!-- Left Arm (down and forward) -->
  <path d="M135 230 L100 280 L95 340 L110 345 L120 290 L145 240" fill="url(#hoodieGradient)"/>
  <circle cx="100" cy="355" r="15" fill="#E8B89D"/>
  
  <!-- Right Arm (down and forward) -->
  <path d="M235 230 L270 280 L275 340 L260 345 L250 290 L225 240" fill="url(#hoodieGradient)"/>
  <circle cx="270" cy="355" r="15" fill="#E8B89D"/>
  
  <!-- === FACE/MASK (looking down) === -->
  <ellipse cx="185" cy="205" rx="35" ry="30" fill="#E8B89D"/>
  
  <g filter="url(#glow)">
    <ellipse cx="170" cy="200" rx="10" ry="6" fill="#FFFFFF"/>
    <circle cx="170" cy="200" r="3" fill="#000"/>
    <ellipse cx="200" cy="200" rx="10" ry="6" fill="#FFFFFF"/>
    <circle cx="200" cy="200" r="3" fill="#000"/>
  </g>
  
  <path d="M160 190 Q170 188 180 192" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M190 192 Q200 188 210 190" fill="none" stroke="#333" stroke-width="2"/>
  
  <path d="M155 215 Q155 230 170 235 L185 238 L200 235 Q215 230 215 215 L215 210 Q185 220 155 210 Z" 
        fill="#0D0D0D"/>
  <path d="M155 210 Q185 220 215 210" fill="none" stroke="#222" stroke-width="1"/>
  
  <!-- === HOODIE DETAILS === -->
  <line x1="170" y1="230" x2="170" y2="290" stroke="#333" stroke-width="3"/>
  <line x1="200" y1="230" x2="200" y2="290" stroke="#333" stroke-width="3"/>
  <circle cx="170" cy="292" r="4" fill="#444"/>
  <circle cx="200" cy="292" r="4" fill="#444"/>
  
  <g transform="translate(185, 290)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" fill="url(#neonCyan)" font-family="Arial" font-size="12" font-weight="bold" filter="url(#glow)">N</text>
  </g>
  
  <path d="M160 350 L180 350 L180 370 Q170 375 160 370 Z" fill="#222"/>
  
  <path d="M150 205 Q185 215 220 205" fill="none" stroke="url(#neonPink)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  
  <rect x="90" y="330" width="20" height="5" fill="#333"/>
  <rect x="260" y="330" width="20" height="5" fill="#333"/>
  
  <ellipse cx="180" cy="495" rx="55" ry="10" fill="#000" opacity="0.3"/>
  
</svg>
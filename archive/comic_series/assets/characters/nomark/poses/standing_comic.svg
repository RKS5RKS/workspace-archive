<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/><stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
    <linearGradient id="htg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B30FF"/><stop offset="100%" style="stop-color:#FF0080"/>
    </linearGradient>
  </defs>
  
  <!-- Hood back -->
  <ellipse cx="200" cy="150" rx="90" ry="100" fill="url(#hg)"/>
  
  <!-- Hair -->
  <path d="M160 90 Q170 55 200 50 Q230 55 240 90 L240 125 Q230 100 200 95 Q170 100 160 125 Z" fill="#1A1A1A"/>
  
  <!-- Face -->
  <ellipse cx="200" cy="140" rx="48" ry="52" fill="#E8DCC8"/>
  
  <!-- Ears -->
  <ellipse cx="150" cy="145" rx="7" ry="11" fill="#E8DCC8"/>
  <ellipse cx="250" cy="145" rx="7" ry="11" fill="#E8DCC8"/>
  
  <!-- Eyebrows -->
  <path d="M170 120 Q180 115 190 120" stroke="#1A1A1A" stroke-width="3" fill="none"/>
  <path d="M210 120 Q220 115 230 120" stroke="#1A1A1A" stroke-width="3" fill="none"/>
  
  <!-- Eyes -->
  <ellipse cx="180" cy="135" rx="11" ry="7" fill="#FFFFFF"/>
  <ellipse cx="220" cy="135" rx="11" ry="7" fill="#FFFFFF"/>
  <ellipse cx="181" cy="135" rx="4" ry="4" fill="#00CCCC"/>
  <ellipse cx="221" cy="135" rx="4" ry="4" fill="#00CCCC"/>
  
  <!-- Nose -->
  <path d="M200 145 L198 152 L202 152" fill="none" stroke="#C9B89A" stroke-width="2"/>
  
  <!-- Mouth -->
  <path d="M190 168 Q200 166 210 168" stroke="#8B7355" stroke-width="2" fill="none"/>
  
  <!-- Hoodie body -->
  <path d="M130 180 Q115 200 115 280 L115 400 Q115 420 140 420 L260 420 Q285 420 285 400 L285 280 Q285 200 270 180 Q250 165 130 180 Z" fill="url(#hg)" stroke="#333" stroke-width="2"/>
  
  <!-- Hood trim -->
  <path d="M130 180 Q115 200 115 220 L115 245 Q140 235 170 235 Q200 235 230 235 Q260 235 285 245 L285 220 Q285 200 270 180 Q250 165 130 180 Z" fill="url(#htg)"/>
  
  <!-- LEFT ARM - Elbow OUT then hand on hip -->
  <path d="M130 200 Q80 200 60 240 Q50 270 90 300 L130 310" fill="url(#hg)" stroke="#333" stroke-width="2"/>
  <circle cx="135" cy="315" r="14" fill="#1A1A1A"/>
  
  <!-- RIGHT ARM - Elbow OUT then hand on hip -->
  <path d="M270 200 Q320 200 340 240 Q350 270 310 300 L270 310" fill="url(#hg)" stroke="#333" stroke-width="2"/>
  <circle cx="265" cy="315" r="14" fill="#1A1A1A"/>
  
  <!-- LEGS -->
  <path d="M160 400 L155 480 L180 480 L190 420" fill="url(#hg)" stroke="#333" stroke-width="2"/>
  <ellipse cx="167" cy="490" rx="18" ry="9" fill="#0D0D0D"/>
  
  <path d="M240 400 L245 480 L220 480 L210 420" fill="url(#hg)" stroke="#333" stroke-width="2"/>
  <ellipse cx="233" cy="490" rx="18" ry="9" fill="#0D0D0D"/>
  
  <!-- N Logo -->
  <text x="200" y="320" font-family="Arial Black" font-size="38" fill="url(#htg)" text-anchor="middle" font-weight="bold">N</text>
</svg>

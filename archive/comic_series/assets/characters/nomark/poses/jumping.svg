<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <!-- NOMARK Character - Jumping Pose -->
  
  <!-- DEFINITIONS -->
  <defs>
    <linearGradient id="hoodieGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF"/>
      <stop offset="100%" style="stop-color:#00CCCC"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0080"/>
      <stop offset="100%" style="stop-color:#CC0066"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- === LEGS (bent for jump) === -->
  <path d="M155 320 L135 400 L155 420 L165 350 L195 350 L205 420 L225 400 L205 320 Z" fill="#1A1A1A"/>
  <!-- Shoes -->
  <path d="M135 420 L115 430 L135 440 L155 430 Z" fill="#0D0D0D"/>
  <path d="M225 420 L245 430 L225 440 L205 430 Z" fill="#0D0D0D"/>
  
  <!-- === HOODIE BODY (slightly raised) === -->
  <path d="M140 130 
           Q130 140 130 180 
           L130 300 
           Q130 320 150 320
           L210 320
           Q230 320 230 300
           L230 180
           Q230 140 220 130
           Q200 120 140 130 Z" 
        fill="url(#hoodieGradient)" stroke="#333" stroke-width="2"/>
  
  <!-- Hood -->
  <ellipse cx="180" cy="100" rx="65" ry="70" fill="#1A1A1A"/>
  <ellipse cx="180" cy="95" rx="55" ry="55" fill="#0D0D0D"/>
  <ellipse cx="180" cy="120" rx="40" ry="35" fill="#1A1A1A"/>
  <path d="M140 100 Q180 80 220 100" fill="none" stroke="#000" stroke-width="3" opacity="0.5"/>
  
  <!-- === ARMS (raised up) === -->
  <!-- Left Arm (up) -->
  <path d="M130 160 L90 100 L85 140 L95 145 L105 110 L135 170" fill="url(#hoodieGradient)"/>
  <circle cx="85" cy="150" r="15" fill="#E8B89D"/>
  
  <!-- Right Arm (up) -->
  <path d="M230 160 L270 100 L275 140 L265 145 L255 110 L225 170" fill="url(#hoodieGradient)"/>
  <circle cx="275" cy="150" r="15" fill="#E8B89D"/>
  
  <!-- === FACE/MASK === -->
  <ellipse cx="180" cy="135" rx="35" ry="30" fill="#E8B89D"/>
  
  <g filter="url(#glow)">
    <ellipse cx="165" cy="130" rx="10" ry="6" fill="#FFFFFF"/>
    <circle cx="165" cy="130" r="3" fill="#000"/>
    <ellipse cx="195" cy="130" rx="10" ry="6" fill="#FFFFFF"/>
    <circle cx="195" cy="130" r="3" fill="#000"/>
  </g>
  
  <path d="M155 120 Q165 118 175 122" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M185 122 Q195 118 205 120" fill="none" stroke="#333" stroke-width="2"/>
  
  <path d="M150 145 Q150 160 165 165 L180 168 L195 165 Q210 160 210 145 L210 140 Q180 150 150 140 Z" 
        fill="#0D0D0D"/>
  <path d="M150 140 Q180 150 210 140" fill="none" stroke="#222" stroke-width="1"/>
  
  <!-- === HOODIE DETAILS === -->
  <line x1="165" y1="160" x2="165" y2="220" stroke="#333" stroke-width="3"/>
  <line x1="195" y1="160" x2="195" y2="220" stroke="#333" stroke-width="3"/>
  <circle cx="165" cy="222" r="4" fill="#444"/>
  <circle cx="195" cy="222" r="4" fill="#444"/>
  
  <g transform="translate(180, 220)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" fill="url(#neonCyan)" font-family="Arial" font-size="12" font-weight="bold" filter="url(#glow)">N</text>
  </g>
  
  <path d="M155 280 L175 280 L175 300 Q165 305 155 300 Z" fill="#222"/>
  
  <path d="M145 135 Q180 145 215 135" fill="none" stroke="url(#neonPink)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  
  <rect x="80" y="135" width="20" height="5" fill="#333"/>
  <rect x="260" y="135" width="20" height="5" fill="#333"/>
  
  <!-- Shadow (smaller for jump) -->
  <ellipse cx="180" cy="450" rx="40" ry="8" fill="#000" opacity="0.3"/>
  
</svg>
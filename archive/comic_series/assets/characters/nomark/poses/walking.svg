<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <!-- NOMARK Character - Base Vector Design -->
  
  <!-- DEFINITIONS -->
  <defs>
    <!-- Gradients -->
    <linearGradient id="hoodieGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF"/>
      <stop offset="100%" style="stop-color:#00CCCC"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0080"/>
      <stop offset="100%" style="stop-color:#CC0066"/>
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- === BASE LAYER === -->
  
  <!-- Legs/Pants -->
  <path d="M145 320 L125 450 L145 450 L160 350 L195 350 L230 450 L250 320 Z" fill="#1A1A1A"/>
  
  <!-- Shoes -->
  <path d="M145 480 L125 490 L145 500 L165 490 Z" fill="#0D0D0D"/>
  <path d="M215 480 L235 490 L215 500 L195 490 Z" fill="#0D0D0D"/>
  
  <!-- === HOODIE BODY === -->
  
  <!-- Main Hoodie Body -->
  <path d="M140 150 
           Q130 160 130 200 
           L130 320 
           Q130 340 150 340
           L210 340
           Q230 340 230 320
           L230 200
           Q230 160 220 150
           Q200 140 140 150 Z" 
        fill="url(#hoodieGradient)" stroke="#333" stroke-width="2"/>
  
  <!-- Hood (up position) -->
  <ellipse cx="180" cy="120" rx="65" ry="70" fill="#1A1A1A"/>
  <ellipse cx="180" cy="115" rx="55" ry="55" fill="#0D0D0D"/>
  
  <!-- Hood Opening (face hole) -->
  <ellipse cx="180" cy="140" rx="40" ry="35" fill="#1A1A1A"/>
  
  <!-- Hood Edge Shadow -->
  <path d="M140 120 Q180 100 220 120" fill="none" stroke="#000" stroke-width="3" opacity="0.5"/>
  
  <!-- === ARMS === -->
  
  <!-- Left Arm -->
  <path d="M130 180 L100 220 L95 280 L105 285 L115 230 L135 190" fill="url(#hoodieGradient)"/>
  <!-- Left Hand -->
  <circle cx="100" cy="295" r="15" fill="#E8B89D"/>
  
  <!-- Right Arm -->
  <path d="M230 180 L260 220 L265 280 L255 285 L245 230 L225 190" fill="url(#hoodieGradient)"/>
  <!-- Right Hand -->
  <circle cx="260" cy="295" r="15" fill="#E8B89D"/>
  
  <!-- === FACE/MASK === -->
  
  <!-- Face (visible upper) -->
  <ellipse cx="180" cy="155" rx="35" ry="30" fill="#E8B89D"/>
  
  <!-- Eyes -->
  <g filter="url(#glow)">
    <!-- Left Eye -->
    <ellipse cx="165" cy="150" rx="10" ry="6" fill="#FFFFFF"/>
    <circle cx="165" cy="150" r="3" fill="#000"/>
    <!-- Right Eye -->
    <ellipse cx="195" cy="150" rx="10" ry="6" fill="#FFFFFF"/>
    <circle cx="195" cy="150" r="3" fill="#000"/>
  </g>
  
  <!-- Eyebrows -->
  <path d="M155 140 Q165 138 175 142" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M185 142 Q195 138 205 140" fill="none" stroke="#333" stroke-width="2"/>
  
  <!-- Mask (lower face) -->
  <path d="M150 165 Q150 180 165 185 L180 188 L195 185 Q210 180 210 165 L210 160 Q180 170 150 160 Z" 
        fill="#0D0D0D"/>
  
  <!-- Mask Edge -->
  <path d="M150 160 Q180 170 210 160" fill="none" stroke="#222" stroke-width="1"/>
  
  <!-- === HOODIE DETAILS === -->
  
  <!-- Hoodie Strings -->
  <line x1="165" y1="180" x2="165" y2="240" stroke="#333" stroke-width="3"/>
  <line x1="195" y1="180" x2="195" y2="240" stroke="#333" stroke-width="3"/>
  <circle cx="165" cy="242" r="4" fill="#444"/>
  <circle cx="195" cy="242" r="4" fill="#444"/>
  
  <!-- Logo/Emblem (chest) -->
  <g transform="translate(180, 240)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" fill="url(#neonCyan)" font-family="Arial" font-size="12" font-weight="bold" filter="url(#glow)">N</text>
  </g>
  
  <!-- Pocket -->
  <path d="M155 300 L175 300 L175 320 Q165 325 155 320 Z" fill="#222"/>
  
  <!-- === ACCENT ELEMENTS === -->
  
  <!-- Neon Trim (collar) -->
  <path d="M145 155 Q180 165 215 155" fill="none" stroke="url(#neonPink)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Sleeve Cuffs -->
  <rect x="90" y="275" width="20" height="5" fill="#333"/>
  <rect x="250" y="275" width="20" height="5" fill="#333"/>
  
  <!-- === SHADOWS === -->
  <ellipse cx="180" cy="510" rx="60" ry="10" fill="#000" opacity="0.3"/>
  
</svg>